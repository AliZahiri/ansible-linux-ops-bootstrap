timezone: UTC

ops_user: ops
ops_groups:
  - sudo
  - docker

base_packages:
  - ca-certificates
  - curl
  - gnupg
  - htop
  - jq
  - rsync
  - unattended-upgrades
  - ufw
  - vim

firewall_allowed_tcp_ports:
  - 22
  - 80
  - 443
  - 9100

docker_packages:
  - docker.io
  - docker-compose-plugin

node_exporter_version: "1.8.2"
node_exporter_user: node_exporter
node_exporter_port: 9100

backup_dir: /opt/backups
backup_retention_days: 7
